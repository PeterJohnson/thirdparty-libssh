name: CI

on: [ push, pull_request ]

jobs:
  build-linux:
    name: "Build - Linux"
    runs-on: ubuntu-latest
    container: wpilib/ubuntu-base:24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build
        run: ./gradlew build

      - uses: actions/upload-artifact@v7
        with:
          name: Linux
          path: build/allOutputs

  build-linux-arm64:
    name: "Build - Linux Arm64"
    runs-on: ubuntu-latest
    container: wpilib/aarch64-cross-ubuntu:2027-bookworm-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build
        run: ./gradlew build -Pforcecrossbuild=linux-arm64

      - uses: actions/upload-artifact@v7
        with:
          name: Linux Arm64
          path: build/allOutputs

  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact-name: Win64
            vc: amd64
          - artifact-name: WinArm64
            vc: amd64_arm64
            build-options: "-Pforcecrossbuild=windows-arm64"
    name: "Build - ${{ matrix.artifact-name }}"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'

      - uses: ilammy/setup-nasm@v1

      - uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: ${{ matrix.vc }}

      - name: Build with Gradle
        run: gradlew build ${{ matrix.build-options }}
        shell: cmd

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: build/allOutputs

  build-macos:
    env:
      MACOSX_DEPLOYMENT_TARGET: 11
    name: "Build - macOS"
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build
        run: ./gradlew build

      - uses: actions/upload-artifact@v7
        with:
          name: macOS
          path: build/allOutputs

  combine:
    name: Combine
    needs: [ build-linux, build-windows, build-macos, build-linux-arm64 ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: wpilibsuite/build-tools
      - uses: actions/download-artifact@v8
        with:
          path: combiner/products/build/allOutputs
      - name: Flatten Artifacts
        run: rsync -a --delete combiner/products/build/allOutputs/*/* combiner/products/build/allOutputs/
      - uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'
      - name: Combine
        if: |
          !startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew publish -Pthirdparty
        working-directory: combiner
      - name: Combine (Release)
        if: |
          github.repository_owner == 'wpilibsuite' &&
          startsWith(github.ref, 'refs/tags/v')
        run: |
          ./gradlew publish -Pthirdparty
        working-directory: combiner
        env:
          RUN_AZURE_ARTIFACTORY_RELEASE: 'TRUE'
          ARTIFACTORY_PUBLISH_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PUBLISH_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
      - uses: actions/upload-artifact@v7
        with:
          name: Maven
          path: ~/releases
